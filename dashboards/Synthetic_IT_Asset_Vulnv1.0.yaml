$schema: https://schemas.humio.com/dashboard/v0.23.0
name: "CQL Demo — Synthetic IT Asset & Vulnerability Dashboard - Alt- v1.0.0"
timeSelector:
  defaultTimeJumpInMs: 30000
sharedTimeInterval:
  enabled: true
  isLive: false
  start: 60d
labels:
  - IT Asset Management
  - Vulnerability Management
  - Security & Compliance

parameters:
  plat_filter:
    label: Platform
    order: 1
    type: list
    defaultValue: '*'
    width: 1
    values:
      '*': 'All'
      Win: Windows
      Mac: macOS
      Lin: Linux

  dept_filter:
    label: Department
    order: 2
    type: text
    defaultValue: '*'
    width: 2

  asset_type_filter:
    label: Asset Type
    order: 3
    type: list
    defaultValue: '*'
    width: 1
    values:
      '*': 'All'
      Server: Server
      Workstation: Workstation
      Laptop: Laptop

  sev_filter:
    label: Severity
    order: 4
    type: list
    defaultValue: '*'
    width: 1
    values:
      '*': 'All'
      Critical: Critical
      High: High
      Medium: Medium
      Low: Low

  status_filter:
    label: Vuln Status
    order: 5
    type: list
    defaultValue: '*'
    width: 1
    values:
      '*': 'All'
      Open: Open
      Patched: Patched
      Accepted: Accepted

  category_filter:
    label: Category
    order: 6
    type: list
    defaultValue: '*'
    width: 1
    values:
      '*': 'All'
      OS: OS
      App: Application
      Config: Configuration

sections:
  section-assets:
    title: "Asset Inventory"
    order: 0
    collapsed: false
    widgetIds:
      - widget-params-assets
      - widget-note-assets
      - kpi-total-assets
      - kpi-managed
      - kpi-servers
      - kpi-unmanaged
      - chart-platform-assets
      - chart-dept-assets
      - chart-asset-type
      - gauge-managed
      - map-assets
      - table-assets

  section-vulns:
    title: "Vulnerability Management"
    order: 1
    collapsed: false
    widgetIds:
      - widget-params-vulns
      - widget-note-vulns
      - kpi-vuln-total
      - kpi-vuln-critical
      - kpi-vuln-open
      - kpi-vuln-hosts
      - sankey-vuln-flow
      - chart-vuln-by-sev
      - gauge-patch-rate
      - table-top-vuln-hosts
      - chart-vuln-timeline
      - table-vuln-detail

widgets:

  # ─── SECTION 1: ASSET INVENTORY ──────────────────────────────────────────────

  # ─── Parameter Panel ─────────────────────────────────────────────────────────
  widget-params-assets:
    type: parameterPanel
    title: ''
    x: 0
    y: 0
    width: 7
    height: 2
    parameterIds:
      - plat_filter
      - dept_filter
      - asset_type_filter

  # ─── Documentation Note (sidebar) ────────────────────────────────────────────
  widget-note-assets:
    type: note
    title: ''
    x: 7
    y: 0
    width: 5
    height: 16
    text: |
      ```
      CQL Demo — Synthetic IT Asset & Vulnerability Dashboard
      Version: 1.0.0  |  Data: createEvents() synthetic
      ```

      ## Section 1 — Asset Inventory

      **Zero dependencies** — all 25 asset records generated
      inline via `createEvents()`. No repository needed.

      ## CQL Patterns Demonstrated

      | Widget | Key Pattern |
      |--------|------------|
      | Total Assets KPI | `count()` |
      | Managed / Servers KPIs | equality filter + `count()` |
      | Unmanaged KPI | `managed = "false"` + red background |
      | Platform Pie | `groupBy()` + named `series:` colors |
      | Department Bar | `groupBy()` + `sort(_count, desc)` |
      | Asset Type Donut | `groupBy()` + `innerRadius: 0.4` |
      | Managed % Gauge | `stats()` + percentage formula |
      | World Map | `lat * 1` coercion → `worldMap()` |
      | Asset Table | `select()` + emoji via `case{}` |

      ## Filters
      - **Platform / Asset Type** — `list` param →
        `wildcard(includeEverythingOnAsterisk=true)`
      - **Department** — `text` param →
        `wildcard(ignoreCase=true)`

      ## Time Range Note
      Set to **Last 60 days** — synthetic asset timestamps are
      fixed in May 2025. `createEvents()` ignores repo time
      range so all 25 assets always appear.

      ## Promoting to Production
      Replace `createEvents([...]) | kvParse()`
      with your real `#repo` and tag filters.

