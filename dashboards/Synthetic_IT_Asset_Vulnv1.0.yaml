      | findTimestamp(field=ts)
      | wildcard(field=plat, pattern=?plat_filter, ignoreCase=true, includeEverythingOnAsterisk=true)
      | wildcard(field=dept, pattern=?dept_filter, ignoreCase=true, includeEverythingOnAsterisk=true)
      | wildcard(field=asset_type, pattern=?asset_type_filter, ignoreCase=true, includeEverythingOnAsterisk=true)
      | case {
          managed = "true"  | _mgd := "✅";
          managed = "false" | _mgd := "❌";
          *                 | _mgd := "❓";
        }
      | case {
          plat = "Win" | _pos := 1;
          plat = "Mac" | _pos := 2;
          plat = "Lin" | _pos := 3;
          *            | _pos := 4;
        }
      | sort(_pos, order=asc, limit=max)
      | drop(_pos)
      | select([_mgd, aid, host, owner, dept, os, asset_type, ip, country])
      | rename([[_mgd, "Mgd"], [aid, "AID"], [host, "Host"], [owner, "Owner"],
                [dept, "Dept"], [os, "OS"], [asset_type, "Type"],
                [ip, "IP"], [country, "Country"]])
    options:
      row-numbers-enabled: true
      cell-overflow: wrap-text
      column-overflow: truncate
      configured-columns:
        Mgd:
          width: 50
        AID:
          width: 80
        Type:
          color:
            conditions:
              - color: '#DB2D2444'
                condition:
                  type: Equal
                  arg: Server
              - color: '#0073E644'
                condition:
                  type: Equal
                  arg: Workstation
              - color: '#34B24844'
                condition:
                  type: Equal
                  arg: Laptop
    interactions:
      - name: Filter by Platform
        titleTemplate: '▽ Filter to "{{ fields["plat"] }}" platform'
        type: updateparameters
        useWidgetTimeWindow: false
        arguments:
          plat_filter: '["{{ fields["plat"] }}"]'
      - name: Filter by Department
        titleTemplate: '▽ Filter to "{{ fields["Dept"] }}" department'
        type: updateparameters
        useWidgetTimeWindow: false
        arguments:
          dept_filter: '["{{ fields["Dept"] }}"]'
      - name: Filter by Asset Type
        titleTemplate: '▽ Filter to "{{ fields["Type"] }}" assets'
        type: updateparameters
        useWidgetTimeWindow: false
        arguments:
          asset_type_filter: '["{{ fields["Type"] }}"]'
      - name: Reset all filters
        titleTemplate: '↻ Reset all filters'
        type: updateparameters
        useWidgetTimeWindow: false
        arguments:
          plat_filter:       '["*"]'
          dept_filter:       '["*"]'
          asset_type_filter: '["*"]'

  # ─── SECTION 2: VULNERABILITY MANAGEMENT ─────────────────────────────────────

  # ─── Parameter Panel ─────────────────────────────────────────────────────────
  widget-params-vulns:
    type: parameterPanel
    title: ''
    x: 0
    y: 0
    width: 12
    height: 2
    parameterIds:
      - sev_filter
      - status_filter
      - category_filter

  # ─── Documentation Note (sidebar) ────────────────────────────────────────────
  widget-note-vulns:
    type: note
    title: ''
    x: 7
    y: 2
    width: 5
    height: 13
    text: |
      ## Section 2 — Vulnerability Management

      **30 synthetic CVEs** across the asset fleet above,
      generated inline via `createEvents()`.

      ## CQL Patterns Demonstrated

      | Widget | Key Pattern |
      |--------|------------|
      | Vuln KPIs | `count()`, `count(distinct=true)` |
      | Critical KPI | equality filter + red background |
      | Open KPI | equality filter + orange background |
      | Sankey | `sankey(source=, target=, weight=)` |
      | Severity Bar | `groupBy()` + `case{}` sort key |
      | Patch Rate Gauge | `stats()` + percentage formula |
      | Top Hosts Table | `groupBy([host])` + `sort()` |
      | Timeline | `doff` trick → `timeChart(series=)` |
      | Detail Table | `select()` + severity emoji |

      ## Filters
      - **Severity / Status / Category** — `list` params
        → `wildcard(includeEverythingOnAsterisk=true)`

      ## Interactions
      `▽ Filter by` — section-scoped filter
      `↻ Reset` — clear filter(s)

