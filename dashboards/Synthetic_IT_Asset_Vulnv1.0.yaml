      | kvParse()
      | findTimestamp(field=ts)
      | wildcard(field=severity, pattern=?sev_filter, ignoreCase=true, includeEverythingOnAsterisk=true)
      | wildcard(field=status, pattern=?status_filter, ignoreCase=true, includeEverythingOnAsterisk=true)
      | wildcard(field=category, pattern=?category_filter, ignoreCase=true, includeEverythingOnAsterisk=true)
      | case {
          severity = "Critical" | sev_icon := "🔴 Critical";
          severity = "High"     | sev_icon := "🟠 High";
          severity = "Medium"   | sev_icon := "🟡 Medium";
          severity = "Low"      | sev_icon := "🟢 Low";
          *                     | sev_icon := severity;
        }
      | case {
          status = "Open"     | status_icon := "🔓 Open";
          status = "Patched"  | status_icon := "✅ Patched";
          status = "Accepted" | status_icon := "📋 Accepted";
          *                   | status_icon := status;
        }
      | table([vuln_id, host, cve, sev_icon, cvss, package, category, status_icon], limit=100)
    options:
      columns:
        - name: vuln_id
          header: ID
        - name: host
          header: Host
        - name: cve
          header: CVE
        - name: sev_icon
          header: Severity
        - name: cvss
          header: CVSS
        - name: package
          header: Package
        - name: category
          header: Category
        - name: status_icon
          header: Status
    interactions:
      - name: Filter by Severity
        titleTemplate: '▽ Filter to "{{ fields["sev_icon"] }}" severity'
        type: updateparameters
        useWidgetTimeWindow: false
        arguments:
          sev_filter: '["{{ fields["severity"] }}"]'
      - name: Filter by Status
        titleTemplate: '▽ Filter to "{{ fields["status_icon"] }}" status'
        type: updateparameters
        useWidgetTimeWindow: false
        arguments:
          status_filter: '["{{ fields["status"] }}"]'
      - name: Filter by Category
        titleTemplate: '▽ Filter to "{{ fields["category"] }}" category'
        type: updateparameters
        useWidgetTimeWindow: false
        arguments:
          category_filter: '["{{ fields["category"] }}"]'
      - name: Reset all Vuln filters
        titleTemplate: '↻ Reset all vulnerability filters'
        type: updateparameters
        useWidgetTimeWindow: false
        arguments:
          sev_filter:      '["*"]'
          status_filter:   '["*"]'
          category_filter: '["*"]'
