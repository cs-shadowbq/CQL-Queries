      | wildcard(field=sev, pattern=?sev_filter, ignoreCase=true, includeEverythingOnAsterisk=true)
      | wildcard(field=plat, pattern=?plat_filter, ignoreCase=true, includeEverythingOnAsterisk=true)
      | wildcard(field=user, pattern=?user_filter, ignoreCase=true, includeEverythingOnAsterisk=true)
      // Severity emoji icon — narrow indicator column
      | case {
          sev = "Critical" | _icon := "🔴";
          sev = "High"     | _icon := "🟠";
          sev = "Medium"   | _icon := "🟡";
          sev = "Low"      | _icon := "🟢";
          *                | _icon := "⚪";
        }
      // Human-readable timestamp
      | "Detected" := formatTime("%Y-%m-%d %H:%M", field=@timestamp, locale=en_US, timezone=Z)
      | sort(field=@timestamp, order=desc, limit=max)
      | select([_icon, id, "Detected", host, user, plat, sev, tactic, tech, file])
      | rename([[_icon, ""], [id, "ID"], [host, "Host"], [user, "User"],
                [plat, "Platform"], [sev, "Severity"], [tactic, "Tactic"],
                [tech, "Technique"], [file, "File"]])
    options:
      row-numbers-enabled: true
      cell-overflow: wrap-text
      column-overflow: truncate
      configured-columns:
        '':
          width: 40
        Severity:
          color:
            conditions:
              - color: '#DB2D2444'
                condition:
                  type: Equal
                  arg: Critical
              - color: '#F4912544'
                condition:
                  type: Equal
                  arg: High
              - color: '#FFC10744'
                condition:
                  type: Equal
                  arg: Medium
              - color: '#34B24844'
                condition:
                  type: Equal
                  arg: Low
    interactions:
      - name: Filter by Severity
        titleTemplate: '▽ Filter to "{{ fields["Severity"] }}" severity'
        type: updateparameters
        useWidgetTimeWindow: false
        arguments:
          sev_filter: '["{{ fields["Severity"] }}"]'
      - name: Filter by Platform
        titleTemplate: '▽ Filter to "{{ fields["Platform"] }}" platform'
        type: updateparameters
        useWidgetTimeWindow: false
        arguments:
          plat_filter: '["{{ fields["Platform"] }}"]'
      - name: Filter by User
        titleTemplate: '▽ Filter to user "{{ fields["User"] }}"'
        type: updateparameters
        useWidgetTimeWindow: false
        arguments:
          user_filter: '["{{ fields["User"] }}"]'
      - name: Reset all filters
        titleTemplate: '↻ Reset all filters'
        type: updateparameters
        useWidgetTimeWindow: false
        arguments:
          sev_filter:  '["*"]'
          plat_filter: '["*"]'
          user_filter: '["*"]'
