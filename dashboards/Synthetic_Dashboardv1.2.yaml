      | groupBy([sev], function=count(as=Count), limit=max)
      // Assign sort key so bar order is Critical > High > Medium > Low
      | case {
          sev = "Critical" | _ord := 1;
          sev = "High"     | _ord := 2;
          sev = "Medium"   | _ord := 3;
          sev = "Low"      | _ord := 4;
          *                | _ord := 5;
        }
      | sort(_ord, order=asc)
      | drop(_ord)
    options:
      barChartOrientation: horizontal
      valuesOnBars: true
      labelLimit: 100
      series:
        Critical:
          color: '#DB2D24'
        High:
          color: '#F49125'
        Medium:
          color: '#FFC107'
        Low:
          color: '#34B248'

