$schema: https://schemas.humio.com/dashboard/v0.23.0
name: "CQL Demo — Synthetic Threat Detection Dashboard v1.2"
timeSelector:
  defaultTimeJumpInMs: 30000
sharedTimeInterval:
  enabled: true
  isLive: false
  start: 30d

parameters:
  sev_filter:
    label: Severity
    order: 1
    type: list
    defaultValue: '*'
    width: 1
    values:
      '*': 'All'
      Critical: Critical
      High: High
      Medium: Medium
      Low: Low

  plat_filter:
    label: Platform
    order: 2
    type: list
    defaultValue: '*'
    width: 1
    values:
      '*': 'All'
      Win: Windows
      Mac: macOS
      Lin: Linux

  user_filter:
    label: User
    order: 3
    type: text
    defaultValue: '*'
    width: 2

sections:
  section-summary:
    title: "Summary"
    order: 0
    collapsed: false
    widgetIds:
      - chart-gauge
      - widget-params
      - widget-note
      - kpi-total
      - kpi-critical
      - kpi-hosts
      - kpi-users
      - chart-severity
      - chart-platform
      - chart-tactic
      - chart-timeline
      - table-detail

widgets:

  # ─── Parameter Panel ─────────────────────────────────────────────────────────
  widget-params:
    type: parameterPanel
    title: ''
    x: 0
    y: 0
    width: 7
    height: 2
    parameterIds:
      - plat_filter
      - sev_filter
      - user_filter

  # ─── Documentation Note ──────────────────────────────────────────────────────
  widget-note:
    type: note
    title: ''
    x: 7
    y: 0
    width: 5
    height: 15
    text: |
      ```
      CQL Demo — Synthetic Threat Detection Dashboard
      Version: 1.0.0  |  Data: createEvents() synthetic
      ```

      ## About This Dashboard

      **Zero dependencies** — all 20 detection events are generated
      inline via `createEvents()`. No repository, no CSV, no ingest needed.

      ## CQL Patterns Demonstrated

      | Widget | Key Pattern |
      |--------|------------|
      | Total / Critical KPIs | `count()`, severity filter |
      | Hosts / Users KPIs | `count(distinct=true)` |
      | Severity Bar | `groupBy()` + `case{}` sort key |
      | Platform Pie | `groupBy()` + named series colors |
      | Tactic Bar | `groupBy()` + `sort(_count, desc)` |
      | Timeline | `timeChart()` + `findTimestamp()` |
      | Detail Table | `select()` + severity emoji via `case{}` |

      ## Filters
      - **Severity / Platform** — `list` param → `wildcard(includeEverythingOnAsterisk=true)`
      - **User** — `text` param → `wildcard(ignoreCase=true)`

      ## Time Range Note
      Set to **Last 60 days** — synthetic timestamps are fixed
      in May 2025. `createEvents()` ignores repo time range,
      but `timeChart()` buckets on `@timestamp`.

      ## Promoting to Production
      Replace `createEvents([...]) | kvParse() | findTimestamp(field=ts)`
      with your real `#repo` and tag filters.

