      | case {
          managed = "yes" | _icon := "✅";
          managed = "no"  | _icon := "❌";
          *               | _icon := "❓";
        }
      | "Last Seen" := formatTime("%Y-%m-%d", field=@timestamp, locale=en_US, timezone=Z)
