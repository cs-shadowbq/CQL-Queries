$schema: https://schemas.humio.com/dashboard/v0.23.0
name: "CQL Demo — Synthetic IT Asset & Vulnerability Dashboard v1.0.1"
timeSelector:
  defaultTimeJumpInMs: 30000
sharedTimeInterval:
  enabled: true
  isLive: false
  start: 30d

parameters:
  os_filter:
    label: OS
    order: 1
    type: list
    defaultValue: '*'
    width: 1
    values:
      '*': 'All'
      Windows: Windows
      macOS: macOS
      Linux: Linux

  dept_filter:
    label: Department
    order: 2
    type: list
    defaultValue: '*'
    width: 1
    values:
      '*': 'All'
      Eng: Engineering
      Finance: Finance
      HR: HR
      IT: IT
      Ops: Operations

  managed_filter:
    label: Managed
    order: 3
    type: list
    defaultValue: '*'
    width: 1
    values:
      '*': 'All'
      'yes': Managed
      'no': Unmanaged

  sev_filter:
    label: Severity
    order: 4
    type: list
    defaultValue: '*'
    width: 1
    values:
      '*': 'All'
      Critical: Critical
      High: High
      Medium: Medium
      Low: Low

sections:
  section-assets:
    title: "Asset Inventory"
    order: 0
    collapsed: false
    widgetIds:
      - widget-params
      - note-overview
      - kpi-total-assets
      - kpi-managed
      - kpi-unmanaged
      - kpi-locations
      - chart-os-dist
      - chart-dept-bar
      - chart-managed-gauge
      - chart-country-bar
      - map-geo
      - table-assets

  section-vulns:
    title: "Vulnerability Management"
    order: 1
    collapsed: false
    widgetIds:
      - note-vuln
      - kpi-total-vulns
      - kpi-critical
      - kpi-unpatched
      - kpi-patch-rate
      - sankey-vuln-flow
      - chart-vuln-by-os
      - chart-patch-gauge
      - table-vuln-detail

widgets:

  # ── Section 1 — Asset Inventory ───────────────────────────────────────────────

  widget-params:
    type: parameterPanel
    title: ''
    x: 0
    y: 0
    width: 7
    height: 2
    parameterIds:
      - os_filter
      - dept_filter
      - managed_filter
      - sev_filter

  note-overview:
    type: note
    title: ''
    x: 7
    y: 0
    width: 5
    height: 15
    text: |
      ```
      CQL Demo — Synthetic IT Asset & Vulnerability Dashboard
      Version: 1.0.1  |  Data: createEvents() synthetic
      ```

      ## About This Dashboard

      **Zero dependencies** — all 20 asset events and 24 vulnerability events
      are generated inline via `createEvents()`. No repository, no CSV, no ingest needed.

      ## Data Model

      | Dataset         | Records | Key Fields                              |
      |-----------------|---------|------------------------------------------|
      | Assets          | 20      | host, os, dept, country, lat/lon, managed |
      | Vulnerabilities | 24      | host, os, dept, cve, sev, status          |

      ## CQL Patterns Demonstrated

      | Widget         | Key Pattern                              |
      |----------------|------------------------------------------|
      | KPIs           | `count()`, `count(distinct=true)`        |
      | OS Pie         | `groupBy([os])` donut (innerRadius)      |
      | Dept Bar       | `groupBy([dept])` horizontal bar         |
      | Managed Gauge  | `stats()` with subpipeline               |
      | World Map      | `lat := lat * 1` coerce + `worldMap()`   |
      | Asset Table    | `case{}` emoji + interactions            |
      | Sankey         | `sankey(source="sev", target="status")`  |
      | Patch Gauge    | `stats()` patched/total ratio            |

      ## Filters
      - **OS / Dept / Managed** — applied to Asset section widgets
      - **OS / Dept / Severity** — applied to Vulnerability section widgets

      ## Time Range
      Last 30 days. All events use
      `@timestamp := now() - (doff * 86400000)` so they
      always fall within the active window.

      ## Promoting to Production
      Replace `createEvents([...]) | kvParse()` with your
      real `#repo` and tag filters. Keep all downstream
      pipeline steps unchanged.

