        titleTemplate: '▽ Filter to "{{ fields["Severity"] }}" severity'
        type: updateparameters
        useWidgetTimeWindow: false
        arguments:
          sev_filter: '["{{ fields["Severity"] }}"]'
      - name: Filter by OS
        titleTemplate: '▽ Filter to "{{ fields["OS"] }}" OS'
        type: updateparameters
        useWidgetTimeWindow: false
        arguments:
          os_filter: '["{{ fields["OS"] }}"]'
      - name: Reset all filters
        titleTemplate: '↻ Reset all filters'
        type: updateparameters
        useWidgetTimeWindow: false
        arguments:
          os_filter: '["*"]'
          dept_filter: '["*"]'
          managed_filter: '["*"]'
          sev_filter: '["*"]'
