      | case {
          sev = "Critical" | _icon := "🔴";
          sev = "High"     | _icon := "🟠";
          sev = "Medium"   | _icon := "🟡";
          sev = "Low"      | _icon := "🟢";
          *                | _icon := "⚪";
        }
      | case {
          status = "Patched"    | _sticon := "✅";
          status = "Open"       | _sticon := "🔓";
          status = "Mitigating" | _sticon := "🛡️";
          status = "Accepted"   | _sticon := "📋";
          *                     | _sticon := "❓";
        }
      | "Detected" := formatTime("%Y-%m-%d", field=@timestamp, locale=en_US, timezone=Z)
      | sort(field=@timestamp, order=desc, limit=max)
      | select([_icon, vid, "Detected", host, os, dept, cve, sev, _sticon, status])
      | rename([[_icon, ""], [vid, "ID"], [host, "Host"], [os, "OS"],
                [dept, "Dept"], [cve, "CVE"], [sev, "Severity"],
                [_sticon, " "], [status, "Status"]])
    options:
      row-numbers-enabled: true
      cell-overflow: wrap-text
      column-overflow: truncate
      configured-columns:
        '':
          width: 40
        ' ':
          width: 40
        Severity:
          color:
            conditions:
              - color: '#DB2D2444'
                condition:
                  type: Equal
                  arg: Critical
              - color: '#F4912544'
                condition:
                  type: Equal
                  arg: High
              - color: '#FFC10744'
                condition:
                  type: Equal
                  arg: Medium
              - color: '#34B24844'
                condition:
                  type: Equal
                  arg: Low
    interactions:
